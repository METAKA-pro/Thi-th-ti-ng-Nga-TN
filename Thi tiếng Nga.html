                content: "<p>Самый замечательный человек, которого я когда-либо знал, — это моя прабабушка. Она в прошлом году умерла, но в моей памяти она останется навсегда живой. Я часто расспрашивал бабулю о том, что она пережила за свои 80 лет. Моя прабабушка Мария Сергеевна родилась и почти всю жизнь прожила в Брянской области. Начало войны застало её в деревне. Бабушка работала в колхозе.</p><p>Когда в 1941 году до деревни дошли фашисты, бабуля ушла в лес – она стала воевать против врагов, стала партизанкой. В партизанском отряде бабушка готовила еду. Через некоторое время она влюбилась в моего будущего прадедушку Павла Ивановича. Скромно сыграли свадьбу: прадедушка воевал, прабабушка варила обеды.</p><p>С одного боевого задания Павел не вернулся. Прабабушка, которая уже ждала моего дедушку, осталась одна. Она отправилась в свою деревню. Немцы схватили молодую партизанку и отправили в лагерь. Там прабабушка родила моего дедушку. Такие истории, которые рассказывала мне моя прабабушка, сделали для меня историю моей Родины гораздо ближе.</p>",

            {

            {
                title: "Текст 4: Андроников монастырь",
                content: "<p>На берегу реки Яузы, напротив Кремля, находится Андроников монастырь – одно из самых интересных и замечательных мест Москвы. На территории этого монастыря можно увидеть самое старое здание Москвы, сохранившееся до наших дней – Спасский собор.</p><p>Андроников монастырь хранит память об интересных событиях русской истории и об Андрее Рублёве – великом художнике XIV-XV веков. Андрей Рублёв был монахом Андроникова монастыря, здесь провёл он последние годы своей жизни, здесь умер и здесь был похоронен.</p><p>В 1947 году, когда Москве исполнилось 800 лет, в стенах монастыря был создан музей древнерусского искусства. В залах музея хранится уникальная коллекция древнерусского искусства, широко известная как в нашей стране, так и в мире. В музее посетители могут познакомиться с московской школой живописи конца XV века, с известными во всём мире русскими иконами. В музее можно также посмотреть и другие произведения искусства: резьбу по дереву и камню, старинные рукописи и книги.</p>",

        let timeRemaining = 120 * 60;

        let isSubmitted = false;
        let historyData = [];
        let quizNumber = 0;
        let currentUser = "";
        let totalQuestions = 0; // Biến đếm tổng số câu

        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function generateNewQuiz(isInitialLoad = false) {
            if (!isInitialLoad && !isSubmitted) {
                if (!confirm("Bạn chưa nộp bài! Hệ thống sẽ tự động nộp bài hiện tại trước khi tạo đề mới. Bạn đồng ý chứ?")) return;
                submitQuiz();
            }

            quizNumber++;
            isSubmitted = false;
            currentUser = "";
            document.getElementById('score-display').style.display = 'none';
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('submit-btn').innerText = "NỘP BÀI & CHẤM ĐIỂM";
            
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';
            
            const selectedListening = shuffleArray(listeningBank)[0];
            const final40MCQs = shuffleArray([...shuffleArray(imageMcqBank).slice(0, 5), ...shuffleArray(mcqBank).slice(0, 35)]);
            const selectedReading = shuffleArray(readingBank)[0];
            const selectedRewrites = shuffleArray(rewriteBank).slice(0, 5);

            // Tính tổng số câu hỏi để tạo Bảng theo dõi
            totalQuestions = selectedListening.questions.length + final40MCQs.length + selectedReading.questions.length + selectedRewrites.length;

            let html = `<h2 class="section-title">PHẦN 1: NGHE HIỂU (АУДИРОВАНИЕ)</h2>
                <div class="question-card" style="border-left-color: #805ad5;">
                    <div class="question-title" style="font-weight:bold;">${selectedListening.title}</div>
                    <audio controls class="audio-player" style="width:100%; margin-top:10px;"><source src="${selectedListening.audioSrc}"></audio>
                    <div id="listening-transcript" style="display:none; margin-top:10px;">${selectedListening.transcript || ''}</div>
                </div>`;
            
            let qIdx = 1; // Biến đếm số thứ tự câu xuyên suốt
            selectedListening.questions.forEach(item => html += renderMCQ(item, qIdx++));
            
            html += `<h2 class="section-title">PHẦN 2: TRẮC NGHIỆM TỪ VỰNG NGỮ PHÁP</h2>`;
            final40MCQs.forEach(item => html += renderMCQ(item, qIdx++));

            html += `<h2 class="section-title">PHẦN 3: ĐỌC HIỂU (ЧТЕНИЕ)</h2><div class="question-card">${selectedReading.content}</div>`;
            selectedReading.questions.forEach(item => html += renderMCQ(item, qIdx++));

            html += `<h2 class="section-title">PHẦN 4: VIẾT LẠI CÂU (ПИСЬМО)</h2>`;
            selectedRewrites.forEach(item => {
                html += `<div class="question-card rewrite-q" id="q-${qIdx}" data-ans='${JSON.stringify(item.ans)}'>
                    <button class="flag-btn" onclick="toggleFlag(${qIdx}, this)">🚩 Đánh dấu</button>
                    <b>Câu ${qIdx}:</b> ${item.q.replace('\n','<br>')}
                    <input type="text" placeholder="Nhập câu trả lời của bạn vào đây..." style="width:100%; padding:10px; margin-top:10px; font-size:15px;" oninput="markAnswered(${qIdx}, this.value)">
                    <div class="explanation"><b>Đáp án đúng:</b> ${item.ans[0]}<br>${item.exp}</div>
                </div>`;
                qIdx++;
            });

            container.innerHTML = html;
            
            // Gọi hàm tạo Bảng theo dõi
            initTracker(totalQuestions);

            clearInterval(timerInterval);
            document.getElementById('timer-display').innerText = "120:00";
            document.getElementById('modal-title').innerText = `ĐỀ SỐ ${quizNumber}`;
            document.getElementById('header-title').innerText = `ĐỀ SỐ ${quizNumber} | Đang chờ...`;
            document.getElementById('start-modal').style.display = 'flex';
            document.getElementById('student-name').value = '';
            document.getElementById('student-name').focus();
        }

        window.startQuizAfterName = function() {
            let nameInput = document.getElementById('student-name').value.trim();
            if (nameInput === "") { alert("Vui lòng nhập họ và tên của bạn để bắt đầu làm bài!"); return; }
            currentUser = nameInput;
            document.getElementById('header-title').innerText = `ĐỀ SỐ ${quizNumber} | Thí sinh: ${currentUser}`;
            document.getElementById('start-modal').style.display = 'none';
            startTimer();
        }

        function renderMCQ(item, idx) {
            let img = item.imageSrc ? `<br><img src="${item.imageSrc}" class="question-image">` : '';
            let opts = shuffleArray(item.options.map((t, i) => ({t, is: i === item.answer})));
            return `<div class="question-card mcq-q" id="q-${idx}">
                <button class="flag-btn" onclick="toggleFlag(${idx}, this)">🚩 Đánh dấu</button>
                <b>Câu ${idx}:</b> ${item.q.replace('\n','<br>')}${img}
                <div class="options-list">${opts.map(o => `<button class="option-btn" data-is="${o.is}" onclick="sel(this, ${idx})">${o.t}</button>`).join('')}</div>
                <div class="explanation">${item.explanation || item.exp}</div>
            </div>`;
        }

        // Cập nhật hàm chọn đáp án để truyền số thứ tự câu (idx)
        window.sel = (b, idx) => { 
            if(!isSubmitted) { 
                b.parentElement.querySelectorAll('.option-btn').forEach(x => x.classList.remove('selected')); 
                b.classList.add('selected'); 
                markAnswered(idx); // Kích hoạt đổi màu bảng theo dõi
            } 
        };

        // ==========================================
        // CÁC HÀM CHO BẢNG THEO DÕI VÀ CẮM CỜ
        // ==========================================
        window.initTracker = (total) => {
            let trackerGrid = document.getElementById('tracker-grid');
            let html = '';
            for(let i = 1; i <= total; i++) {
                html += `<div class="tracker-btn" id="track-${i}" onclick="scrollToQ(${i})">${i}</div>`;
            }
            trackerGrid.innerHTML = html;
            document.getElementById('question-tracker').style.display = 'block';
        };

        window.scrollToQ = (idx) => {
            const qCard = document.getElementById(`q-${idx}`);
            if(qCard) {
                const headerOffset = 80;
                const elementPosition = qCard.getBoundingClientRect().top;
                const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
                window.scrollTo({ top: offsetPosition, behavior: "smooth" });
            }
        };

        window.markAnswered = (idx, val = null) => {
            let btn = document.getElementById(`track-${idx}`);
            if(!btn) return;
            if(val !== null && val.trim() === "") btn.classList.remove('answered'); // Xóa màu nếu xóa text
            else btn.classList.add('answered');
        };

        window.toggleFlag = (idx, btnElem) => {
            let trackBtn = document.getElementById(`track-${idx}`);
            if(!trackBtn) return;
            trackBtn.classList.toggle('flagged');
            btnElem.classList.toggle('active');
            if(btnElem.classList.contains('active')) btnElem.innerHTML = "🚩 Đã đánh dấu";
            else btnElem.innerHTML = "🚩 Đánh dấu";
        };

        // ==========================================
        // NỘP BÀI VÀ CÁC CHỨC NĂNG CÒN LẠI
        // ==========================================
        window.submitQuiz = () => {
            if (isSubmitted) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            
            let correct = 0, total = 0;
            const container = document.getElementById('quiz-container');
            
            container.querySelectorAll('.mcq-q').forEach(q => {
                total++;
                q.querySelectorAll('.option-btn').forEach(b => {
                    b.disabled = true;
                    if(b.dataset.is === "true") b.classList.add('show-correct');
                    if(b.classList.contains('selected')) {
                        if(b.dataset.is === "true") { b.classList.add('correct'); correct++; }
                        else b.classList.add('wrong');
                    }
                });
                q.querySelector('.explanation').style.display = 'block';
            });

            container.querySelectorAll('.rewrite-q').forEach(q => {
                total++;
                let input = q.querySelector('input'), user = input.value.trim().toLowerCase().replace(/[,.]/g, '');
                input.disabled = true;
                let answers = JSON.parse(q.dataset.ans).map(a => a.toLowerCase().replace(/[,.]/g, ''));
                if(answers.includes(user)) { correct++; input.style.background = '#c6f6d5'; }
                else input.style.background = '#fed7d7';
                q.querySelector('.explanation').style.display = 'block';
            });

            if(document.getElementById('listening-transcript')) document.getElementById('listening-transcript').style.display = 'block';

            let score = Math.round((correct/total)*100);
            let scoreHtml = `<h1>Điểm: ${score}/100</h1><h3>Đúng ${correct}/${total} câu</h3>`;
            document.getElementById('score-display').innerHTML = scoreHtml;
            document.getElementById('score-display').style.display = 'block';
            document.getElementById('submit-btn').innerText = "ĐÃ NỘP BÀI";
            document.getElementById('submit-btn').disabled = true;
            
            historyData.push({ quizNum: quizNumber, name: currentUser, date: new Date().toLocaleString(), scoreHtml: scoreHtml, quizHtml: document.getElementById('quiz-container').innerHTML });
            window.scrollTo(0,0);
        };

        function startTimer() { 
            clearInterval(timerInterval); 
            timeRemaining = 120*60; 
            timerInterval = setInterval(() => {
                timeRemaining--; let m = Math.floor(timeRemaining/60), s = timeRemaining%60;
                document.getElementById('timer-display').innerText = `${m}:${s<10?'0':''}${s}`;
                if(timeRemaining<=0) submitQuiz();
            }, 1000); 
        }

        window.toggleHistory = () => { 
            document.getElementById('quiz-view').style.display = 'none'; 
            document.getElementById('question-tracker').style.display = 'none'; // Ẩn bảng khi xem lịch sử
            document.getElementById('history-view').style.display = 'block'; 
            window.scrollTo(0, 0); 
            
            let list = document.getElementById('history-list'); 
            list.innerHTML = historyData.length ? historyData.map((h, i) => 
                `<button class="history-item-btn" onclick="showHist(${i})">📄 Đề số ${h.quizNum} - Thí sinh: <b>${h.name}</b> - Ngày: ${h.date}</button>`
            ).join('') : '<p style="text-align:center;">Chưa có dữ liệu bài thi nào.</p>'; 
        };
        
        window.showHist = (i) => { 
            const detail = document.getElementById('history-detail');
            detail.innerHTML = `<hr style="margin:30px 0; border:1px solid #cbd5e0;"><h3 style="text-align:center; color:#2c5282;">CHI TIẾT ĐỀ ${historyData[i].quizNum} - Thí sinh: ${historyData[i].name}</h3><div>${historyData[i].scoreHtml}${historyData[i].quizHtml}</div>`; 
            window.scrollTo(0, 0); 
            const audios = detail.querySelectorAll('audio'); audios.forEach(a => a.controls = true);
        };
        
        window.backToQuiz = () => { 
            document.getElementById('history-view').style.display = 'none'; 
            document.getElementById('quiz-view').style.display = 'block'; 
            document.getElementById('question-tracker').style.display = 'block'; // Hiện lại bảng
            window.scrollTo(0, 0);
        };

        window.onscroll = function() {
            let topBtn = document.getElementById("back-to-top");
            if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) topBtn.style.display = "block";
            else topBtn.style.display = "none";
        };

        window.scrollToTop = function() { window.scrollTo({ top: 0, behavior: 'smooth' }); };
        
        window.onload = () => {
            let pass = prompt("HỆ THỐNG BẢO MẬT: \nVui lòng nhập mật khẩu để truy cập bộ đề:");
            if(pass !== "123456") { document.body.innerHTML = "<h1 style='text-align:center; margin-top:20%; color:#e53e3e; font-family:sans-serif;'>MẬT KHẨU SAI!<br>BẠN KHÔNG CÓ QUYỀN TRUY CẬP ĐỀ THI NÀY.</h1>"; return; }
            const nameInput = document.getElementById('student-name');
            if(nameInput) { nameInput.addEventListener('keypress', function (e) { if (e.key === 'Enter') startQuizAfterName(); }); }
            generateNewQuiz(true);
        };
    </script>
</body>
</html>
